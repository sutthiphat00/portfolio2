<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Awesome Website</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#090909,#111827,#0f172a);
    color:white;
    overflow-x:hidden;
}

body::before{
    content:"";
    position:fixed;
    width:500px;
    height:500px;
    background:#00e5ff;
    filter:blur(180px);
    opacity:.15;
    top:-200px;
    left:-100px;
}

body::after{
    content:"";
    position:fixed;
    width:400px;
    height:400px;
    background:#7c3aed;
    filter:blur(160px);
    opacity:.18;
    bottom:-150px;
    right:-100px;
}

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:25px 10%;
}

.logo{
    font-size:28px;
    font-weight:700;
    color:#00e5ff;
}

nav ul{
    display:flex;
    list-style:none;
    gap:35px;
}

nav a{
    color:white;
    text-decoration:none;
    transition:.3s;
}

nav a:hover{
    color:#00e5ff;
}

.hero{
    display:flex;
    align-items:center;
    justify-content:space-between;
    min-height:85vh;
    padding:0 10%;
    flex-wrap:wrap;
}

.text{
    max-width:550px;
}

.text h1{
    font-size:58px;
    line-height:1.2;
}

.text span{
    color:#00e5ff;
}

.text p{
    margin:25px 0;
    color:#cbd5e1;
    line-height:1.7;
}

.btn{
    display:inline-block;
    padding:15px 35px;
    background:#00e5ff;
    color:#000;
    border-radius:50px;
    text-decoration:none;
    font-weight:bold;
    transition:.3s;
}

.btn:hover{
    transform:translateY(-5px);
    box-shadow:0 0 25px #00e5ff;
}

.card{
    width:360px;
    height:420px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.15);
    border-radius:30px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:120px;
    box-shadow:0 20px 60px rgba(0,0,0,.4);
    animation:float 5s ease-in-out infinite;
}

@keyframes float{
    0%,100%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-18px);
    }
}

footer{
    text-align:center;
    padding:30px;
    color:#94a3b8;
}

@media(max-width:900px){

.hero{
    justify-content:center;
    text-align:center;
    gap:50px;
}

.text h1{
    font-size:42px;
}

.card{
    width:300px;
    height:350px;
}

nav{
    flex-direction:column;
    gap:20px;
}
}
</style>

</head>
<body>

<nav>

<div class="logo">MYLOGO</div>

<ul>
<li><a href="#">Home</a></li>
<li><a href="#">About</a></li>
<li><a href="#">Portfolio</a></li>
<li><a href="#">Contact</a></li>
</ul>

</nav>

<section class="hero">

<div class="text">

<h1>สร้างเว็บไซต์ให้ <span>โดดเด่น</span> และทันสมัย</h1>

<p>
ดีไซน์สไตล์ Dark Mode พร้อม Glassmorphism
ดูสวยงาม รองรับทั้งมือถือและคอมพิวเตอร์
</p>

<a href="#" class="btn">เริ่มต้นเลย</a>

</div>

<div class="card">
🚀
</div>

</section>

<footer>
© 2026 My Awesome Website
</footer>

</body>
</html>
