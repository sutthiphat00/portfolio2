<style>


*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;

}


body{

background:#050505;

color:white;

overflow-x:hidden;

}



/* ===== Background ===== */


body::before{

content:"";

position:fixed;

width:500px;

height:500px;

background:#38bdf8;

filter:blur(180px);

opacity:.25;

top:-150px;

left:-150px;

z-index:-1;

animation:light1 8s infinite alternate;

}



body::after{

content:"";

position:fixed;

width:500px;

height:500px;

background:#8b5cf6;

filter:blur(180px);

opacity:.25;

bottom:-150px;

right:-150px;

z-index:-1;

animation:light2 10s infinite alternate;

}



@keyframes light1{

from{

transform:translate(0);

}

to{

transform:translate(150px,100px);

}

}



@keyframes light2{

from{

transform:translate(0);

}

to{

transform:translate(-150px,-100px);

}

}



/* ===== Navbar ===== */


nav{

width:100%;

position:fixed;

top:0;

left:0;

z-index:999;


display:flex;

justify-content:space-between;

align-items:center;


padding:20px 8%;


background:rgba(0,0,0,.35);

backdrop-filter:blur(20px);


border-bottom:1px solid rgba(255,255,255,.1);

}



.logo{

font-size:28px;

font-weight:700;

color:#38bdf8;

}



nav ul{

display:flex;

list-style:none;

}



nav ul li{

margin-left:30px;

}



nav ul li a{

text-decoration:none;

color:white;

transition:.3s;

font-size:15px;

}



nav ul li a:hover{

color:#38bdf8;

text-shadow:0 0 15px #38bdf8;

}



/* ===== Hero ===== */


.hero{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;


padding:120px 8%;


gap:80px;

flex-wrap:wrap;

}



/* ===== Content ===== */


.content{

max-width:650px;

animation:show 1s ease;

}



@keyframes show{

from{

opacity:0;

transform:translateY(50px);

}

to{

opacity:1;

transform:translateY(0);

}

}



.content h3{

color:#38bdf8;

font-size:25px;

}



.content h1{

font-size:65px;

margin:15px 0;


background:linear-gradient(

90deg,

#38bdf8,

#8b5cf6

);


-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

}



.content h2{

font-size:30px;

color:#e5e7eb;

margin-bottom:20px;

}



.content p{

color:#d1d5db;

line-height:1.9;

font-size:17px;

}



/* ===== Quote ===== */


.quote{

margin:30px 0;

font-size:22px;

font-style:italic;

color:#facc15;


border-left:5px solid #facc15;

padding-left:20px;

}



/* ===== Button ===== */


.btn-area{

display:flex;

flex-wrap:wrap;

gap:15px;

margin-top:35px;

}



.btn{

display:inline-block;

padding:15px 35px;

border-radius:50px;


text-decoration:none;

color:white;


background:

linear-gradient(

45deg,

#3b82f6,

#8b5cf6

);


transition:.4s;

}



.btn:hover{

transform:translateY(-8px);

box-shadow:0 0 30px #38bdf8;

}



.btn2{

background:transparent;

border:2px solid #38bdf8;

}



.btn2:hover{

background:#38bdf8;

}



/* ===== Profile ===== */


.profile{

position:relative;

}



.profile::before{

content:"";

position:absolute;

inset:-15px;


border-radius:50%;


background:

linear-gradient(

45deg,

#38bdf8,

#8b5cf6,

#38bdf8

);


animation:rotate 6s linear infinite;


z-index:-1;

}



@keyframes rotate{

from{

transform:rotate(0deg);

}


to{

transform:rotate(360deg);

}

}



.profile img{


width:330px;

height:330px;


border-radius:50%;


object-fit:cover;


border:8px solid #050505;


box-shadow:

0 0 40px #38bdf8;


transition:.5s;


}



.profile img:hover{

transform:scale(1.05);

}
