<style>

*{
box-sizing:border-box;
}


body{

margin:0;

font-family:'Sarabun',sans-serif;

color:white;

text-align:center;


background:

linear-gradient(

to bottom,

#10002b,

#240046,

#5a189a,

#000

);


min-height:100vh;

overflow:hidden;

}



/* แสงเวทมนตร์ */

.magic{

position:fixed;

width:12px;

height:12px;

background:#ffd700;

border-radius:50%;

box-shadow:

0 0 20px gold;


animation:float 8s infinite;

}



@keyframes float{

0%{

transform:translateY(100vh);

opacity:0;

}


50%{

opacity:1;

}


100%{

transform:translateY(-100vh);

opacity:0;

}

}



/* Header */

header{

padding:40px;


background:

rgba(0,0,0,.35);


backdrop-filter:blur(10px);


border-bottom:

2px solid gold;


}



h1{

font-family:'Cinzel',serif;

font-size:55px;


color:#ffd700;


text-shadow:

0 0 15px gold,

0 0 40px orange;


}



.subtitle{

font-size:22px;

}


/* เมนู */

nav{

margin-top:30px;

}


nav a{


display:inline-block;


padding:15px 30px;


margin:10px;


background:

linear-gradient(

#ffd700,

#b8860b

);


color:#3b1f00;


text-decoration:none;


font-weight:bold;


border-radius:30px;


border:3px solid white;


box-shadow:

0 0 20px gold;


transition:.3s;


}


nav a:hover{


transform:

translateY(-8px)

scale(1.1);


}



/* ตัวละคร */


.hero{


margin-top:40px;


}



.hero img{


width:230px;

height:230px;


object-fit:cover;


border-radius:50%;


border:

8px solid gold;


box-shadow:

0 0 40px gold;


}



/* กล่องสถานะ */


.status{


width:80%;

max-width:600px;


margin:30px auto;


padding:25px;


background:

rgba(255,255,255,.15);


backdrop-filter:blur(20px);


border:

2px solid gold;


border-radius:25px;


box-shadow:

0 0 40px purple;


}


.status h2{

color:#ffd700;

font-family:'Cinzel';

}



.stat{

font-size:18px;

line-height:2;

}



/* ปุ่มเริ่ม */


.start{


display:inline-block;


margin-top:20px;


padding:18px 45px;


background:

linear-gradient(

90deg,

#8e2de2,

#4a00e0

);


color:white;


border-radius:40px;


text-decoration:none;


font-weight:bold;


box-shadow:

0 0 30px purple;


}



footer{


position:absolute;

bottom:0;

width:100%;


padding:15px;


background:black;


}



</style>
