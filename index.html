<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portfolio | Home</title>


<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">


<style>


*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;

}


html{

scroll-behavior:smooth;

}



body{

background:#050505;

color:white;

overflow-x:hidden;

}



/* ===== Background Animation ===== */


body::before{

content:"";

position:fixed;

width:600px;

height:600px;

background:#38bdf8;

filter:blur(180px);

opacity:.25;

top:-200px;

left:-200px;

z-index:-1;

animation:moveLight 8s infinite alternate;

}


body::after{

content:"";

position:fixed;

width:500px;

height:500px;

background:#8b5cf6;

filter:blur(170px);

opacity:.25;

bottom:-200px;

right:-150px;

z-index:-1;

animation:moveLight2 10s infinite alternate;

}



@keyframes moveLight{


from{

transform:translate(0,0);

}


to{

transform:translate(150px,100px);

}


}



@keyframes moveLight2{


from{

transform:translate(0,0);

}


to{

transform:translate(-150px,-100px);

}


}



/* ===== Navbar ===== */


nav{


position:fixed;

top:0;

left:0;

width:100%;


display:flex;

justify-content:space-between;

align-items:center;


padding:20px 8%;


background:rgba(255,255,255,.05);

backdrop-filter:blur(20px);


border-bottom:1px solid rgba(255,255,255,.1);


z-index:1000;


}



.logo{


font-size:28px;

font-weight:700;

color:#38bdf8;

letter-spacing:2px;


}



nav ul{


display:flex;

list-style:none;


}


nav ul li{


margin-left:30px;


}


nav ul li a{


text-decoration:none;

color:white;

font-size:15px;

transition:.3s;


}



nav ul li a:hover{


color:#38bdf8;


text-shadow:0 0 15px #38bdf8;


}



/* ===== Hero ===== */


.hero{


min-height:100vh;


display:flex;

align-items:center;

justify-content:center;


padding:120px 8%;


gap:80px;


flex-wrap:wrap;


}



/* ===== Profile ===== */


.profile{


position:relative;


}


.profile::before{


content:"";


position:absolute;


inset:-15px;


border-radius:50%;


background:linear-gradient(

45deg,

#38bdf8,

#8b5cf6,

#38bdf8

);


animation:rotate 6s linear infinite;


z-index:-1;


}



@keyframes rotate{


from{

transform:rotate(0deg);

}


to{

transform:rotate(360deg);

}


}



.profile img{


width:330px;

height:330px;


border-radius:50%;


object-fit:cover;


border:8px solid #050505;


box-shadow:


0 0 40px #38bdf8;


}



.profile:hover img{


transform:scale(1.05);


transition:.5s;


}



/* ===== Content ===== */


.content{


max-width:650px;


animation:show .8s ease;


}


@keyframes show{


from{


opacity:0;

transform:translateY(50px);


}


to{


opacity:1;

transform:translateY(0);


}


}



.content h3{


color:#38bdf8;

font-size:25px;


}



.content h1{


font-size:65px;


margin:10px 0;


background:

linear-gradient(

90deg,

#38bdf8,

#8b5cf6

);


-webkit-background-clip:text;

-webkit-text-fill-color:transparent;


}



.content h2{


font-size:30px;

color:#e5e7eb;

margin-bottom:20px;


}



.content p{


color:#d1d5db;

line-height:1.9;

font-size:17px;


}



/* Quote */


.quote{


margin:30px 0;


font-size:22px;


font-style:italic;


color:#facc15;


border-left:5px solid #facc15;


padding-left:20px;


}



/* Button */


.btn-area{


display:flex;

gap:15px;

flex-wrap:wrap;


}



.btn{


padding:15px 35px;


border-radius:50px;


text-decoration:none;


color:white;


background:

linear-gradient(

45deg,

#3b82f6,

#8b5cf6

);


transition:.4s;


}



.btn:hover{


transform:translateY(-8px);


box-shadow:

0 0 30px #38bdf8;


}



.btn2{


background:transparent;


border:2px solid #38bdf8;


}



.btn2:hover{


background:#38bdf8;


}

.typing{

color:#38bdf8;

font-weight:700;

border-right:3px solid #38bdf8;

white-space:nowrap;

overflow:hidden;

animation:

typing 4s steps(30) infinite,

cursor .7s infinite;

}



@keyframes typing{


0%{

width:0;

}


50%{

width:100%;

}


100%{

width:0;

}


}



@keyframes cursor{


50%{

border-color:transparent;

}


}



/* ===== Profile Card ===== */


.info-section{


width:90%;

max-width:1200px;

margin:80px auto;


display:grid;


grid-template-columns:

repeat(auto-fit,minmax(250px,1fr));


gap:25px;


}



.info-card{


background:

rgba(255,255,255,.06);


border:1px solid rgba(255,255,255,.1);


backdrop-filter:blur(15px);


padding:30px;


border-radius:25px;


transition:.4s;


}



.info-card:hover{


transform:translateY(-15px);


box-shadow:

0 0 30px rgba(56,189,248,.4);


border-color:#38bdf8;


}



.info-card h3{


color:#38bdf8;


font-size:25px;


margin-bottom:15px;


}



.info-card p{


color:#d1d5db;


line-height:1.8;


}



/* ===== Statistics ===== */


.stats{


width:90%;

max-width:1000px;


margin:80px auto;


display:grid;


grid-template-columns:

repeat(auto-fit,minmax(200px,1fr));


gap:20px;


}



.stat-box{


text-align:center;


padding:35px;


border-radius:25px;


background:

linear-gradient(

135deg,

rgba(56,189,248,.15),

rgba(139,92,246,.15)

);


border:1px solid rgba(255,255,255,.1);


transition:.4s;


}



.stat-box:hover{


transform:scale(1.08);


box-shadow:

0 0 35px rgba(139,92,246,.5);


}



.stat-box h1{


font-size:45px;


color:#38bdf8;


}



.stat-box p{


color:#ddd;


}



/* ===== Scroll Down ===== */


.scroll{


position:absolute;


bottom:30px;


left:50%;


transform:translateX(-50%);


}



.scroll span{


display:block;


width:25px;


height:40px;


border:3px solid #38bdf8;


border-radius:20px;


position:relative;


}



.scroll span::before{


content:"";


position:absolute;


width:6px;


height:10px;


background:#38bdf8;


border-radius:10px;


left:50%;


top:8px;


transform:translateX(-50%);


animation:scrollMove 1.5s infinite;


}



@keyframes scrollMove{


0%{


transform:translate(-50%,0);


opacity:1;


}


100%{


transform:translate(-50%,15px);


opacity:0;


}


}



/* ===== Floating Circle ===== */


.circle{


position:absolute;


border-radius:50%;


filter:blur(2px);


animation:floating 5s infinite alternate;


}



.circle.one{


width:80px;


height:80px;


background:#38bdf8;


opacity:.3;


top:20%;


left:10%;


}



.circle.two{


width:120px;


height:120px;


background:#8b5cf6;


opacity:.2;


bottom:15%;


right:10%;


}



@keyframes floating{


from{


transform:translateY(0);


}


to{


transform:translateY(-40px);


}


}

จากนั้นให้นำ HTML ส่วนนี้ไปวาง ต่อจาก </section> ของ Hero ก่อน </body>

</section>

    /* ===== Page Loading Animation ===== */


.hero,
.info-section,
.stats{

animation:fadeIn 1.2s ease;

}


@keyframes fadeIn{


from{

opacity:0;

transform:translateY(40px);

}


to{

opacity:1;

transform:translateY(0);

}


}



/* ===== Footer ===== */


footer{
